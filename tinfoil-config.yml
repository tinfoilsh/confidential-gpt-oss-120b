cvm-version: 0.7.4
memory: 65536
cpus: 16
gpus: 1

models:
  - name: "gpt-oss-120b"
    repo: "openai/gpt-oss-120b@b5c939de8f754692c1647ca79fbf85e8c1e70f8a"
    mpk: "db5daddec41a3be3b51d1f4d009fb0e9b1243c2765e2bc5121acac79ab070a72_195764056064_0eefa619-50b7-588f-a072-d405fb439d36"

containers:
  - name: "gpt-oss-120b"
    image: "vllm/vllm-openai:v0.19.0-x86_64-cu130@sha256:da83ab68697f08b48a4c06a916411b2853eed69f01b482d41fbf3fab69b4c7be"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    env:
      - PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    command: [
      "--model", "/tinfoil/mpk/mpk-db5daddec41a3be3b51d1f4d009fb0e9b1243c2765e2bc5121acac79ab070a72",
      "--served-model-name", "gpt-oss-120b",
      "--enable-auto-tool-choice",
      "--tool-call-parser", "openai",
      "--gpu-memory-utilization", "0.95",
      "--port", "8001"
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /metrics
    - /v1/responses
    - /health
