cvm-version: 0.10.8
cpus: 16
memory: 65536
gpus: 1

networks:
  nvidia:
    egress: allowlist
    allow:
      - edge.urm.nvidia.com
      - openaipublic.blob.core.windows.net




models:
  - name: "gpt-oss-120b"
    repo: "openai/gpt-oss-120b@b5c939de8f754692c1647ca79fbf85e8c1e70f8a"
    mpk: "db5daddec41a3be3b51d1f4d009fb0e9b1243c2765e2bc5121acac79ab070a72_195764056064_0eefa619-50b7-588f-a072-d405fb439d36"

containers:
  - name: "gpt-oss-120b"
    image: "vllm/vllm-openai:v0.22.0@sha256:0fec7ec5f3e6bc168e54899935fb0557da908a4832a1dbc88e2debcf2f889416"
    runtime: nvidia
    gpus: all
    restart: always
    env:
      - PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    command: ["--model", "/tinfoil/mpk/mpk-db5daddec41a3be3b51d1f4d009fb0e9b1243c2765e2bc5121acac79ab070a72", "--served-model-name",
      "gpt-oss-120b", "--enable-auto-tool-choice", "--tool-call-parser", "openai", "--gpu-memory-utilization", "0.95", "--scheduling-policy",
      "priority", "--port", "8001"]
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
      /usr/local/lib/python3.12/dist-packages/flashinfer_cubin/cubins: size=2g,mode=1777,exec
    networks: ["nvidia"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /metrics
    - /v1/responses
    - /health
